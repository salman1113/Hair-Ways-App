version: "3.9"

services:
  # 1. PostgreSQL Database
  db:
    image: postgres:15
    restart: always
    env_file:
      - backend_core/.env
    environment:
      POSTGRES_DB: ${DB_NAME:-hairways_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # 1.5 Redis for WebSockets & Celery
  redis:
    image: redis:alpine
    restart: always
    ports:
      - "6379:6379"

  # 2. Django Backend Core
  backend:
    build: ./backend_core
    command: >
      sh -c "python manage.py collectstatic --noinput &&
             python manage.py makemigrations &&
             python manage.py migrate &&
             daphne -b 0.0.0.0 -p 8000 saloon_core.asgi:application"
    volumes:
      - ./backend_core:/app
      - static_data:/app/staticfiles
      - media_data:/app/media
    ports:
      - "8000:8000" # Exposing on 8000 directly for local dev testing if needed
    env_file:
      - backend_core/.env
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
    depends_on:
      - db
      - redis

  # 3. FastAPI AI Engine
  ai_engine:
    build: ./ai_engine
    volumes:
      - ./ai_engine:/app
    ports:
      - "8001:8001" # Exposing directly for local dev testing if needed
    env_file:
      - backend_core/.env
    environment:
      - DB_HOST=db
    depends_on:
      - db

  # 4. Nginx API Gateway
  api_gateway:
    build: ./api_gateway
    ports:
      - "80:80" # The main entrypoint for the frontend
    volumes:
      - static_data:/app/staticfiles
      - media_data:/app/media
    depends_on:
      - backend
      - ai_engine

  # 5. Celery Worker (Background tasks)
  celery_worker:
    build: ./backend_core
    command: celery -A saloon_core worker -l INFO
    volumes:
      - ./backend_core:/app
    env_file:
      - backend_core/.env
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
    depends_on:
      - redis
      - db
      - backend

  # 6. Celery Beat (Periodic jobs)
  celery_beat:
    build: ./backend_core
    command: celery -A saloon_core beat -l INFO
    volumes:
      - ./backend_core:/app
    env_file:
      - backend_core/.env
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
    depends_on:
      - redis
      - db
      - backend

volumes:
  pgdata:
  static_data:
  media_data:
