name: Deploy Backend Core to Amazon ECS

on:
  push:
    branches:
      - main
    paths:
      - 'backend_core/**' # ബാക്കെൻഡിൽ മാറ്റം വന്നാൽ മാത്രം ഈ പൈപ്പ്‌ലൈൻ വർക്ക് ആകും

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: hairways/backend # നിന്റെ Backend ECR Repo പേര്
  ECS_SERVICE: hairways-backend-service    # നിന്റെ Backend ECS Service പേര്
  ECS_CLUSTER: hairways-cluster    # നിന്റെ ECS Cluster പേര്
  ECS_TASK_DEFINITION: hairways-backend-task # നിന്റെ Task Definition പേര്
  CONTAINER_NAME: backend          # Task Definition-ലെ കണ്ടെയ്നർ പേര്

jobs:
  deploy:
    name: Deploy Backend    
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        working-directory: ./backend_core # ഇത് വളരെ പ്രധാനമാണ്!
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition --task-definition ${{ env.ECS_TASK_DEFINITION }} --query taskDefinition > task-definition.json

      - name: Fill in the new image ID in the Amazon ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy Amazon ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true